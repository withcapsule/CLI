name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-latest
                    - target: x86_64-apple-darwin
                      os: macos-latest
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools (Linux aarch64)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Configure cross-compilation linker (Linux aarch64)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  mkdir -p .cargo
                  echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
                  echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Package
              run: |
                  BINARY=target/${{ matrix.target }}/release/capsule
                  ARCHIVE=capsule-${{ matrix.target }}.tar.gz
                  tar -czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
                  echo "SHA256 for $ARCHIVE: $(sha256sum $ARCHIVE | awk '{print $1}')"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: capsule-${{ matrix.target }}
                  path: capsule-${{ matrix.target }}.tar.gz

    release:
        name: Publish release
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  merge-multiple: true

            - name: Print SHA256 hashes
              run: |
                  echo "=== SHA256 hashes for capsule.rb ==="
                  for f in capsule-*.tar.gz; do
                    echo "$f: $(sha256sum $f | awk '{print $1}')"
                  done

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  files: capsule-*.tar.gz
                  generate_release_notes: true


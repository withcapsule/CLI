name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      name: aarch64-macos
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      name: x86_64-macos
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      name: aarch64-linux
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      name: x86_64-linux
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      name: x86_64-windows
                    - target: aarch64-pc-windows-msvc
                      os: windows-latest
                      name: aarch64-windows

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools (Linux aarch64)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Configure cross-compilation linker (Linux aarch64)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  mkdir -p .cargo
                  echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
                  echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

            - name: Build
              run: cargo build --release --target ${{ matrix.target }}

            - name: Package
              shell: bash
              run: |
                  if [[ "${{ matrix.target }}" == *"windows"* ]]; then
                    cp target/${{ matrix.target }}/release/capsule.exe capsule-${{ matrix.name }}.exe
                    echo "SHA256 for capsule-${{ matrix.name }}.exe: $(sha256sum capsule-${{ matrix.name }}.exe | awk '{print $1}')"
                  else
                    BINARY=target/${{ matrix.target }}/release/capsule
                    ARCHIVE=capsule-${{ matrix.name }}.tar.gz
                    tar -czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
                    echo "SHA256 for $ARCHIVE: $(sha256sum $ARCHIVE | awk '{print $1}')"
                  fi

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: capsule-${{ matrix.name }}
                  path: capsule-${{ matrix.name }}${{ contains(matrix.target, 'windows') && '.exe' || '.tar.gz' }}

    release:
        name: Publish Release
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  merge-multiple: true

            - name: Display SHA256 hashes
              run: |
                  echo "=== SHA256 hashes for capsule.rb ==="
                  for f in capsule-*.tar.gz capsule-*.exe; do
                    [ -f "$f" ] && echo "$f: $(sha256sum $f | awk '{print $1}')"
                  done

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      capsule-*.tar.gz
                      capsule-*.exe
                  generate_release_notes: true

            - name: Update Homebrew
              run: |
                  curl -X POST \
                    -H "Authorization: Bearer ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
                    -H "Accept: application/vnd.github+json" \
                    https://api.github.com/repos/withcapsule/homebrew-capsule/dispatches \
                    -d "{\"event_type\":\"update-formula\",\"client_payload\":{\"version\":\"${GITHUB_REF_NAME#v}\"}}"

            - name: Update Fedora COPR
              run: |
                  curl -X POST \
                    -H "Authorization: Bearer ${{ secrets.COPR_TOKEN }}" \
                    -H "Accept: application/vnd.github+json" \
                    https://api.github.com/repos/withcapsule/copr-capsule/dispatches \
                    -d "{\"event_type\":\"update-copr\",\"client_payload\":{\"version\":\"${GITHUB_REF_NAME#v}\"}}"

            - name: Update Scoop
              run: |
                  curl -X POST \
                    -H "Authorization: Bearer ${{ secrets.SCOOP_TAP_TOKEN }}" \
                    -H "Accept: application/vnd.github+json" \
                    https://api.github.com/repos/withcapsule/scoop-capsule/dispatches \
                    -d "{\"event_type\":\"update-scoop\",\"client_payload\":{\"version\":\"${GITHUB_REF_NAME#v}\"}}"
